name: Terraform DNS

on:
  pull_request:
    branches: [main]
    paths:
      - "dns/**"
      - ".github/workflows/terraform.yml"
  push:
    branches: [main]
    paths:
      - "dns/**"
      - ".github/workflows/terraform.yml"

permissions:
  contents: read
  pull-requests: write

env:
  TF_IN_AUTOMATION: true
  TF_VAR_domain: joshi1.com
  TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  TF_VAR_cloudflare_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}

jobs:
  dns:
    name: Plan / Apply
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dns

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Terraform Cloud backend
        run: |
          set -euo pipefail
          ORG="${{ vars.TF_CLOUD_ORGANIZATION }}"
          if [ -z "$ORG" ] || [ "$ORG" = "CHANGEME" ]; then
            echo "::error::Set repository variable TF_CLOUD_ORGANIZATION (Terraform Cloud org name)."
            exit 1
          fi
          sed "s/CHANGEME/${ORG}/g" backend.tf.example > backend.tf

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform Format
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        if: github.event_name == 'pull_request'
        run: |
          set -o pipefail
          terraform plan -no-color -input=false -detailed-exitcode 2>&1 | tee plan.txt
          code=${PIPESTATUS[0]}
          if [ "$code" -eq 1 ]; then exit 1; fi
          exit 0

      - name: Prepare plan comment
        if: github.event_name == 'pull_request' && always()
        run: |
          {
            echo "### Terraform plan"
            echo
            echo '```hcl'
            cat plan.txt
            echo '```'
          } > plan-comment.md

      - name: Comment plan on PR
        if: github.event_name == 'pull_request' && always()
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: terraform-plan
          hide_and_recreate: true
          hide_classify: "OUTDATED"
          path: dns/plan-comment.md

      - name: Terraform Apply
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve -input=false
